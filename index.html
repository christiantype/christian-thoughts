    <h2 class="full-width">journal</h2>



    {% for post in site.categories.diary %}
    <span class="hover-title diary-post">
        <a href="{{ post.url | relative_url }}">
            {{ post.title | escape }} . . .
            {{ post.date | date: "%F" }}
            <!-- <p class="black">{{ post.caption | escape }}</p> -->
            {%- if site.show_excerpts -%}
            {{ post.excerpt }}
            {%- endif -%}
        </a>
    </span>

    <span class="hover-image">
        <img class="portfolio-thumbnail no-shadow" src="{{ site.baseurl }}../{{ post.image }}"
          alt="{{ post.title }}" title="{{ post.title }} ">
    </span>

{%- endfor -%}

{%- endif -%}
