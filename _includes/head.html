  <meta name="description" content="Christian Solorzano is the founder of OP/AL, (Original Practice Applied Learning), a design practice in Oak Park, and the Chicago Graphic Design Club, a community of thousands of designers united by generosity, curiosity, and the belief that design grows stronger and moves forward together. He produces Faculty, a publication on Chicago design, and hosts Underscore, a podcast with over one hundred episodes featuring conversations with designers throughout Chicago. Solorzano teaches at DePaul University, is a practicing photographer, and a trained meditation instructor whose contemplative practice shapes everything he makes. He believes design is never decoration; it is inquiry, consciousness, and transformation.">
