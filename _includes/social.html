<ul class="site-social">
  {%- if site.instagram_username -%}
    <li><a href="https://instagram.com/{{ site.instagram_username | escape }}" target="_blank" rel="noopener">IG</a></li>
  {%- endif -%}
  {%- if site.email -%}
    <li><a href="mailto:{{ site.email }}">EMAIL</a></li>
  {%- endif -%}
</ul>
