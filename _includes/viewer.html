{%- comment -%}
  Shared image viewer for /photography/ and /design/.

  Expects the including layout to have already emitted a
  <script id="viewer-data" type="application/json"> array of
  {"f": filename, "a": alt, "m": metadata-or-empty} and to pass:
    include.base — url prefix for the images, e.g. /assets/images/design/

  Two modes: slide (one photograph, arrows, metadata beneath) and grid
  (uniform thumbnails). The toggle sits with the metadata line; the chosen
  mode is remembered per page and reflected in the URL.
{%- endcomment -%}

<main class="site-viewer" data-base="{{ include.base }}">

  <nav class="viewer-modes" aria-label="View mode">
    <button type="button" data-mode="slide" class="active" aria-pressed="true" aria-label="Slide view" title="Slide">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="7"  y="5" width="10" height="14" rx="1.5"/>
        <path d="M4 8.5v7M20 8.5v7"/>
      </svg>
    </button>
    <button type="button" data-mode="grid" aria-pressed="false" aria-label="Grid view" title="Grid">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3.5"  y="3.5"  width="7" height="7" rx="1.5"/>
        <rect x="13.5" y="3.5"  width="7" height="7" rx="1.5"/>
        <rect x="3.5"  y="13.5" width="7" height="7" rx="1.5"/>
        <rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/>
      </svg>
    </button>
  </nav>

  <div class="viewer-stage">
    <button type="button" class="viewer-nav viewer-prev" aria-label="Previous image">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 4 7 12 15 20"/></svg>
    </button>

    <figure class="viewer-frame">
      <img id="viewer-img" alt="">
      <figcaption class="viewer-meta">
        <span class="viewer-count"></span>
        <span class="viewer-exif"></span>
      </figcaption>
    </figure>

    <button type="button" class="viewer-nav viewer-next" aria-label="Next image">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 4 17 12 9 20"/></svg>
    </button>
  </div>

  <div class="viewer-grid" hidden></div>

</main>

<script>
  (function () {
    const root  = document.querySelector('.site-viewer');
    const data  = document.getElementById('viewer-data');
    if (!root || !data) return;
    const BASE  = root.dataset.base;
    const all   = JSON.parse(data.textContent);
    if (!all.length) return;

    const img     = document.getElementById('viewer-img');
    const countEl = root.querySelector('.viewer-count');
    const exifEl  = root.querySelector('.viewer-exif');
    const stage   = root.querySelector('.viewer-stage');
    const grid    = root.querySelector('.viewer-grid');
    const modes   = root.querySelectorAll('.viewer-modes button');
    const body    = document.body;

    let i = 0, mode = 'slide', gridBuilt = false;
    const cache = new Map();

    function preload(n) {
      const item = all[(n + all.length) % all.length];
      if (!item || cache.has(item.f)) return;
      const pre = new Image();
      pre.src = BASE + item.f;
      cache.set(item.f, pre);
    }

    function show(n) {
      i = (n + all.length) % all.length;
      const item = all[i];
      img.src = BASE + item.f;
      img.alt = item.a || '';
      countEl.textContent = String(i + 1).padStart(2, '0') + ' / ' + all.length;
      exifEl.textContent  = item.m || '';
      preload(i + 1); preload(i - 1);
      syncURL();
    }

    // Grid is built once, on first switch — no cost while in slide mode.
    function buildGrid() {
      if (gridBuilt) return;
      const frag = document.createDocumentFragment();
      all.forEach((item, n) => {
        const fig = document.createElement('figure');
        fig.className = 'viewer-thumb';
        const el = document.createElement('img');
        el.src = BASE + item.f;
        el.alt = item.a || '';
        el.loading = 'lazy';
        el.decoding = 'async';
        fig.appendChild(el);
        // clicking a thumbnail opens it in slide mode
        fig.addEventListener('click', () => { show(n); setMode('slide'); });
        frag.appendChild(fig);
      });
      grid.appendChild(frag);
      gridBuilt = true;
    }

    function setMode(next) {
      mode = next;
      if (mode === 'grid') buildGrid();
      stage.hidden = mode !== 'slide';
      grid.hidden  = mode !== 'grid';
      body.classList.toggle('mode-grid', mode === 'grid');
      body.classList.toggle('mode-slide', mode === 'slide');
      modes.forEach(b => {
        const on = b.dataset.mode === mode;
        b.classList.toggle('active', on);
        b.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      try { localStorage.setItem('viewerMode:' + location.pathname, mode); } catch (e) {}
      syncURL();
    }

    function syncURL() {
      const url = new URL(window.location);
      mode === 'grid' ? url.searchParams.set('v', 'grid') : url.searchParams.delete('v');
      mode === 'slide' ? url.searchParams.set('i', i + 1) : url.searchParams.delete('i');
      history.replaceState(null, '', url);
    }

    root.querySelector('.viewer-prev').addEventListener('click', () => show(i - 1));
    root.querySelector('.viewer-next').addEventListener('click', () => show(i + 1));
    modes.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

    document.addEventListener('keydown', e => {
      if (mode !== 'slide') return;
      if (e.key === 'ArrowLeft') show(i - 1);
      else if (e.key === 'ArrowRight') show(i + 1);
      else if (e.key === 'Home') show(0);
      else if (e.key === 'End') show(all.length - 1);
    });

    let x0 = null;
    stage.addEventListener('touchstart', e => { x0 = e.changedTouches[0].clientX; }, {passive: true});
    stage.addEventListener('touchend', e => {
      if (x0 === null) return;
      const dx = e.changedTouches[0].clientX - x0;
      if (Math.abs(dx) > 40) show(dx < 0 ? i + 1 : i - 1);
      x0 = null;
    }, {passive: true});

    // Restore: URL wins, then last-used mode for this page.
    const params = new URLSearchParams(window.location.search);
    const start  = parseInt(params.get('i'), 10);
    show(start && start >= 1 && start <= all.length ? start - 1 : 0);
    let saved = null;
    try { saved = localStorage.getItem('viewerMode:' + location.pathname); } catch (e) {}
    setMode(params.get('v') === 'grid' ? 'grid' : (params.has('v') ? 'slide' : (saved || 'slide')));
  })();
</script>
