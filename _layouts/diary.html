---
layout: default
---

<main class="container">
  <article class="site-post-card">
    <span class="site-post-date">{{ page.date | date: '%m.%d.%y' }}</span>
    <h1 class="site-post-title">{{ page.title }}</h1>
    <div class="site-post-body">
      {{ content | replace: '<img ', '<img loading="lazy" decoding="async" ' }}
    </div>
  </article>
</main>
